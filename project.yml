name: vimember
options:
  bundleIdPrefix: com.brycez021
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  vimember:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: vimember/App
      - path: vimember/Domain
      - path: vimember/Features
      - path: vimember/Services
      - path: vimember/Resources
        buildPhase: resources
    info:
      path: vimember/Info.plist
      properties:
        CFBundleDisplayName: vimember
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "vimember needs access to videos you choose from your photo library."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brycez021.vimember
